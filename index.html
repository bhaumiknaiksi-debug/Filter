<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0a0a0f">
<title>Movies for Bhaumik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c; --gold-light: #e8c878; --gold-dim: #8a6f32;
  --bg: #0a0a0f; --bg2: #11111a; --surface: #1e1e2e; --surface2: #252538;
  --text: #e8e4d8; --text-dim: #7a7870; --text-muted: #4a4840;
  --green: #4caf7d; --red: #e05555; --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity: 0.025; pointer-events: none; z-index: 9999; }
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; }

/* LANDING */
#screen-landing { flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; background: radial-gradient(ellipse 80% 55% at 50% 25%, #18121e 0%, var(--bg) 70%); }
.landing-logo { text-align: center; margin-bottom: 56px; animation: fadeDown 0.8s ease both; }
.landing-logo h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(44px, 13vw, 76px); letter-spacing: 0.18em; color: var(--gold); line-height: 1; }
.landing-logo .subtitle { font-size: 10px; letter-spacing: 0.4em; color: var(--text-dim); margin-top: 10px; text-transform: uppercase; }
.landing-card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid rgba(201,168,76,0.12); border-radius: 16px; padding: 32px 28px; animation: fadeUp 0.8s 0.2s ease both; opacity: 0; animation-fill-mode: forwards; }
.field-label { font-size: 10px; letter-spacing: 0.3em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 14px; }
.api-input { width: 100%; background: var(--bg2); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); color: var(--text); font-family: 'Jost', monospace; font-size: 14px; font-weight: 300; padding: 14px 16px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
.api-input:focus { border-color: rgba(201,168,76,0.4); }
.begin-btn { width: 100%; margin-top: 16px; background: var(--gold); color: #0a0a0f; border: none; border-radius: var(--radius); font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; padding: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.2s; -webkit-appearance: none; }
.begin-btn:active { opacity: 0.85; }
.begin-btn.loading { opacity: 0.6; pointer-events: none; }
.landing-footer { margin-top: 18px; text-align: center; font-size: 12px; color: var(--text-muted); line-height: 1.8; }
.landing-footer a { color: var(--gold-dim); text-decoration: none; }
.error-toast { margin-top: 14px; background: rgba(180,50,50,0.18); border: 1px solid rgba(180,50,50,0.3); border-radius: 20px; padding: 12px 18px; text-align: center; font-size: 13px; color: #e08080; display: none; }
.error-toast.show { display: block; }

/* APP */
#screen-app { flex-direction: column; }
.app-header { position: sticky; top: 0; z-index: 100; background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 0 20px; }
.header-top { display: flex; align-items: center; justify-content: space-between; height: 58px; }
.header-brand .header-logo { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 300; letter-spacing: 0.2em; color: var(--gold); line-height: 1; }
.header-brand .header-sub { font-size: 9px; letter-spacing: 0.28em; color: var(--text-muted); text-transform: uppercase; margin-top: 3px; }
.header-actions { display: flex; gap: 6px; align-items: center; }
.icon-btn { height: 34px; background: var(--surface); border: 1px solid rgba(255,255,255,0.06); border-radius: 17px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-dim); transition: all 0.15s; font-size: 14px; padding: 0 12px; gap: 5px; white-space: nowrap; -webkit-appearance: none; border: none; }
.icon-btn.active, .icon-btn:hover { color: var(--gold); background: var(--surface2); }
.icon-btn .label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }
.search-bar { padding: 0 0 12px; display: none; }
.search-bar.visible { display: block; }
.search-input { width: 100%; background: var(--surface); border: 1px solid rgba(255,255,255,0.08); border-radius: 22px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 300; padding: 10px 18px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; border: 1px solid rgba(255,255,255,0.08); }
.search-input:focus { border-color: rgba(201,168,76,0.3); }
.search-input::placeholder { color: var(--text-muted); }

/* CHIPS */
.genre-strip { display: flex; gap: 8px; overflow-x: auto; padding: 12px 20px; scrollbar-width: none; border-bottom: 1px solid rgba(255,255,255,0.04); }
.genre-strip::-webkit-scrollbar { display: none; }
.chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: var(--text-dim); font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; white-space: nowrap; -webkit-appearance: none; }
.chip:active { opacity: 0.7; }
.chip.active { background: rgba(201,168,76,0.12); border-color: rgba(201,168,76,0.45); color: var(--gold); }
.chip.foryou { border-color: rgba(76,175,125,0.3); color: rgba(76,175,125,0.8); }
.chip.foryou.active { background: rgba(76,175,125,0.12); border-color: rgba(76,175,125,0.55); color: var(--green); }

/* TASTE BAR */
.taste-bar { display: none; margin: 12px 20px 0; padding: 12px 16px; background: var(--surface); border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); }
.taste-bar.visible { display: block; }
.taste-title { font-size: 9px; letter-spacing: 0.3em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 9px; }
.taste-genres { display: flex; gap: 6px; flex-wrap: wrap; }
.taste-genre { font-size: 10px; padding: 3px 10px; border-radius: 12px; background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.18); color: var(--gold-dim); }
.taste-empty { font-size: 12px; color: var(--text-muted); font-style: italic; }

/* SECTION */
.section-label { padding: 18px 20px 10px; font-size: 10px; letter-spacing: 0.35em; color: var(--text-dim); text-transform: uppercase; }

/* GRID */
.movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 16px 100px; }
@media (min-width: 480px) { .movie-grid { grid-template-columns: repeat(3, 1fr); } }
.movie-card { cursor: pointer; border-radius: 10px; overflow: hidden; background: var(--surface); position: relative; aspect-ratio: 2/3; transition: opacity 0.3s; }
.movie-card:active { opacity: 0.8; }
.movie-card.is-rated { opacity: 0.45; }
.movie-poster { width: 100%; height: 100%; object-fit: cover; display: block; }
.movie-poster-placeholder { width: 100%; height: 100%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 32px; }
.movie-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.05) 50%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 12px 10px; }
.movie-title { font-family: 'Cormorant Garamond', serif; font-size: 14px; font-weight: 400; color: #fff; line-height: 1.2; }
.movie-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
.movie-year { font-size: 10px; color: rgba(255,255,255,0.45); }
.movie-rating { font-size: 10px; color: var(--gold); }
.card-badge { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
.card-badge.liked { background: rgba(76,175,125,0.88); }
.card-badge.disliked { background: rgba(224,85,85,0.88); }
.card-badge.seen { background: rgba(90,90,110,0.88); }

/* LOAD MORE */
.load-more-btn { display: block; margin: 0 auto 40px; background: transparent; border: 1px solid rgba(201,168,76,0.25); border-radius: 24px; color: var(--gold-dim); font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; padding: 12px 28px; cursor: pointer; transition: all 0.2s; -webkit-appearance: none; }
.load-more-btn:active { opacity: 0.7; }

/* SKELETON */
.skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 10px; aspect-ratio: 2/3; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { width: 100%; max-width: 560px; max-height: 93vh; background: var(--bg2); border-radius: 20px 20px 0 0; border-top: 1px solid rgba(255,255,255,0.07); overflow-y: auto; scrollbar-width: none; animation: slideUp 0.35s cubic-bezier(0.25,1,0.5,1) both; }
.modal::-webkit-scrollbar { display: none; }
.modal-hero { position: relative; height: 250px; background: var(--surface); }
.modal-backdrop { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.45); display: block; }
.modal-hero-grad { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg2) 0%, transparent 55%); }
.modal-close { position: absolute; top: 14px; right: 14px; width: 30px; height: 30px; background: rgba(0,0,0,0.55); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 16px; border: none; z-index: 10; }
.modal-body { padding: 16px 22px 48px; }
.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 400; color: #fff; line-height: 1.15; }
.modal-tagline { font-size: 13px; color: var(--text-dim); font-style: italic; margin-top: 4px; font-family: 'Cormorant Garamond', serif; }
.modal-stats { display: flex; gap: 18px; margin: 14px 0; flex-wrap: wrap; }
.stat .stat-label { font-size: 9px; letter-spacing: 0.3em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
.stat .stat-value { font-size: 14px; color: var(--text); }
.stat .stat-value.gold { color: var(--gold); }
.modal-genres { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; }
.genre-tag { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border: 1px solid rgba(201,168,76,0.22); border-radius: 12px; color: var(--gold-dim); }
.modal-overview { font-size: 14px; line-height: 1.78; color: rgba(232,228,216,0.72); margin: 14px 0; }

/* ACTION ROW */
.action-row { display: flex; gap: 10px; margin: 18px 0 6px; }
.action-btn { flex: 1; padding: 13px 6px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); background: var(--surface); font-family: 'Jost', sans-serif; font-size: 10px; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text-dim); transition: all 0.2s; -webkit-appearance: none; }
.action-btn .aicon { font-size: 20px; }
.action-btn:active { opacity: 0.75; }
.action-btn.st-liked { background: rgba(76,175,125,0.14); border-color: var(--green); color: var(--green); }
.action-btn.st-disliked { background: rgba(224,85,85,0.14); border-color: var(--red); color: var(--red); }
.action-btn.st-seen { background: rgba(100,100,140,0.18); border-color: rgba(140,140,185,0.4); color: rgba(180,180,215,0.8); }

/* OTT */
.msec-title { font-size: 10px; letter-spacing: 0.3em; color: var(--text-muted); text-transform: uppercase; margin: 22px 0 12px; }
.ott-strip { display: flex; gap: 12px; flex-wrap: wrap; }
.ott-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.ott-logo { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); background: var(--surface); }
.ott-name { font-size: 9px; color: var(--text-muted); max-width: 44px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.no-ott { font-size: 12px; color: var(--text-muted); font-style: italic; padding: 4px 0; }

/* CAST */
.cast-strip { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; }
.cast-strip::-webkit-scrollbar { display: none; }
.cast-card { flex-shrink: 0; width: 58px; text-align: center; }
.cast-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: var(--surface2); display: block; margin: 0 auto 5px; }
.cast-name { font-size: 10px; color: var(--text-dim); line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

/* EMPTY */
.empty-state { grid-column: 1 / -1; padding: 60px 20px; text-align: center; }
.empty-icon { font-size: 38px; margin-bottom: 14px; }
.empty-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--text-dim); margin-bottom: 8px; }
.empty-sub { font-size: 13px; color: var(--text-muted); line-height: 1.65; max-width: 240px; margin: 0 auto; }

/* LOADING */
.loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 300; gap: 6px; }
.loading-screen.hidden { display: none; }
.ls-logo { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 300; letter-spacing: 0.28em; color: var(--gold); animation: pulse 1.6s ease-in-out infinite; }
.ls-for { font-size: 10px; letter-spacing: 0.32em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 22px; }
.ls-bar { width: 90px; height: 1px; background: var(--surface2); border-radius: 1px; overflow: hidden; }
.ls-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s ease; }

@keyframes fadeDown { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
@keyframes pop { 0%,100% { transform: scale(1); } 45% { transform: scale(1.35); } }
.popping { animation: pop 0.28s ease; }
</style>
</head>
<body>

<div class="loading-screen" id="ls">
  <div class="ls-logo">MOVIES</div>
  <div class="ls-for">for Bhaumik</div>
  <div class="ls-bar"><div class="ls-fill" id="ls-fill"></div></div>
</div>

<!-- LANDING -->
<div class="screen active" id="screen-landing">
  <div class="landing-logo">
    <h1>MOVIES</h1>
    <div class="subtitle">curated for Bhaumik</div>
  </div>
  <div class="landing-card">
    <div class="field-label">TMDB API Key</div>
    <input class="api-input" id="api-key-input" type="text" placeholder="Enter your API key…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="begin-btn" id="begin-btn" onclick="handleBegin()">
      <span id="begin-text">BEGIN</span><span>→</span>
    </button>
    <div class="landing-footer">Get a free key at <a href="https://themoviedb.org" target="_blank">themoviedb.org</a><br>Your key is stored only on this device.</div>
    <div class="error-toast" id="err-toast">Invalid key or network error</div>
  </div>
</div>

<!-- APP -->
<div class="screen" id="screen-app">
  <div class="app-header">
    <div class="header-top">
      <div class="header-brand">
        <div class="header-logo">MOVIES</div>
        <div class="header-sub">for Bhaumik</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="seen-toggle-btn" onclick="toggleHideSeen()">
          <span>👁</span><span class="label" id="seen-lbl">HIDE SEEN</span>
        </button>
        <button class="icon-btn" id="search-btn" onclick="toggleSearch()">🔍</button>
        <button class="icon-btn" onclick="handleLogout()">⚙</button>
      </div>
    </div>
    <div class="search-bar" id="search-bar">
      <input class="search-input" id="search-input" placeholder="Search films…" oninput="handleSearch(this.value)">
    </div>
  </div>

  <div class="genre-strip" id="genre-strip">
    <button class="chip foryou" data-mode="foryou" onclick="selectMode('foryou',this)">✦ FOR YOU</button>
    <button class="chip active" data-mode="all" onclick="selectMode('all',this)">ALL</button>
  </div>

  <div class="taste-bar" id="taste-bar">
    <div class="taste-title">YOUR TASTE PROFILE</div>
    <div class="taste-genres" id="taste-genres"></div>
  </div>

  <div class="section-label" id="section-label">TRENDING THIS WEEK</div>
  <div class="movie-grid" id="movie-grid"></div>
  <button class="load-more-btn" id="load-more" onclick="loadMore()" style="display:none">LOAD MORE</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-hero">
      <img class="modal-backdrop" id="m-backdrop" src="" alt="">
      <div class="modal-hero-grad"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-title" id="m-title"></div>
      <div class="modal-tagline" id="m-tagline"></div>
      <div class="modal-stats" id="m-stats"></div>
      <div class="modal-genres" id="m-genres"></div>
      <div class="action-row">
        <button class="action-btn" id="btn-liked" onclick="markMovie('liked')"><span class="aicon">👍</span>LIKED IT</button>
        <button class="action-btn" id="btn-seen" onclick="markMovie('seen')"><span class="aicon">👁</span>SEEN IT</button>
        <button class="action-btn" id="btn-disliked" onclick="markMovie('disliked')"><span class="aicon">👎</span>NOT FOR ME</button>
      </div>
      <div class="modal-overview" id="m-overview"></div>
      <div class="msec-title" id="ott-title" style="display:none">WHERE TO WATCH IN INDIA</div>
      <div class="ott-strip" id="ott-strip"></div>
      <div class="msec-title" id="cast-title" style="display:none">TOP CAST</div>
      <div class="cast-strip" id="cast-strip"></div>
    </div>
  </div>
</div>

<script>
const IMGW = 'https://image.tmdb.org/t/p/w500';
const IMGB = 'https://image.tmdb.org/t/p/w780';
const IMGF = 'https://image.tmdb.org/t/p/w185';
const IMGL = 'https://image.tmdb.org/t/p/original';

let KEY = '', genres = [], mode = 'all', page = 1, search = '', searchT = null, searching = false, hideSeen = false, modalId = null, modalGenreIds = [];

// Storage helpers
const getSeen = () => { try { return JSON.parse(localStorage.getItem('mbh_seen')||'{}'); } catch { return {}; } };
const saveSeen = d => localStorage.setItem('mbh_seen', JSON.stringify(d));

function setStatus(movie, status) {
  const d = getSeen(), id = String(movie.id);
  if (d[id]?.status === status) { delete d[id]; saveSeen(d); return null; }
  d[id] = { id: movie.id, title: movie.title||'', genre_ids: movie.genre_ids||[], status, ts: Date.now() };
  saveSeen(d); return status;
}
const getStatus = id => getSeen()[String(id)]?.status || null;

function getTasteGenres() {
  const d = getSeen(), cnt = {};
  Object.values(d).forEach(m => { if (m.status==='liked') (m.genre_ids||[]).forEach(g => cnt[g]=(cnt[g]||0)+1); });
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id])=>Number(id));
}
function getLikedIds() { return Object.values(getSeen()).filter(m=>m.status==='liked').map(m=>m.id).slice(-6); }

// Boot
window.addEventListener('DOMContentLoaded', () => {
  const k = localStorage.getItem('filtr_key');
  if (k) { KEY = k; boot(); }
  else { document.getElementById('ls').classList.add('hidden'); document.getElementById('api-key-input').addEventListener('keydown',e=>{ if(e.key==='Enter') handleBegin(); }); }
});

async function handleBegin() {
  const k = document.getElementById('api-key-input').value.trim(); if (!k) return;
  const btn = document.getElementById('begin-btn'); btn.classList.add('loading');
  document.getElementById('begin-text').textContent = 'CHECKING';
  document.getElementById('err-toast').classList.remove('show');
  try {
    const r = await fetch(`https://api.themoviedb.org/3/configuration?api_key=${k}`);
    if (!r.ok) throw 0;
    KEY = k; localStorage.setItem('filtr_key', k); boot();
  } catch { btn.classList.remove('loading'); document.getElementById('begin-text').textContent='BEGIN'; document.getElementById('err-toast').classList.add('show'); }
}

async function boot() {
  const fill = document.getElementById('ls-fill'); let p2 = 0;
  const t = setInterval(()=>{ p2=Math.min(p2+11,88); fill.style.width=p2+'%'; },110);
  try { await loadGenres(); } catch {}
  clearInterval(t); fill.style.width='100%';
  await delay(280);
  document.getElementById('ls').classList.add('hidden');
  document.getElementById('screen-landing').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  refreshTasteBar(); skeletons(); loadMovies(true);
}

async function loadGenres() {
  const r = await fetch(`https://api.themoviedb.org/3/genre/movie/list?api_key=${KEY}`);
  const d = await r.json(); genres = d.genres||[];
  const strip = document.getElementById('genre-strip');
  genres.forEach(g => {
    const b = document.createElement('button');
    b.className='chip'; b.dataset.mode=g.id; b.textContent=g.name.toUpperCase();
    b.onclick=()=>selectMode(g.id,b); strip.appendChild(b);
  });
}

function selectMode(m, el) {
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); el.classList.add('active');
  mode=m; page=1; searching=false; clearSearch(); updateLabel(); refreshTasteBar(); skeletons(); loadMovies(true);
}

function updateLabel() {
  const lbl = document.getElementById('section-label');
  if (searching) { lbl.textContent='SEARCH RESULTS'; return; }
  if (mode==='foryou') { lbl.textContent='PICKED FOR YOU'; return; }
  if (mode==='all') { lbl.textContent='TRENDING THIS WEEK'; return; }
  const g = genres.find(x=>x.id===mode); lbl.textContent = g ? g.name.toUpperCase() : 'FILMS';
}

function refreshTasteBar() {
  const bar = document.getElementById('taste-bar'), el = document.getElementById('taste-genres');
  if (mode!=='foryou') { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  const profile = getTasteGenres();
  if (!profile.length) { el.innerHTML='<span class="taste-empty">Like some movies to train your taste profile</span>'; return; }
  el.innerHTML = profile.map(id=>{ const g=genres.find(x=>x.id===id); return g?`<span class="taste-genre">${g.name}</span>`:''; }).join('');
}

async function loadMovies(reset=false) {
  document.getElementById('load-more').style.display='none';
  try {
    let movies=[], tp=1;
    if (searching && search.length>1) {
      const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${KEY}&query=${encodeURIComponent(search)}&page=${page}`);
      const d=await r.json(); movies=d.results||[]; tp=d.total_pages;
    } else if (mode==='foryou') {
      movies=await buildForYou(); tp=1;
    } else if (mode==='all') {
      const r=await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${KEY}&page=${page}`);
      const d=await r.json(); movies=d.results||[]; tp=d.total_pages;
    } else {
      const r=await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_genres=${mode}&sort_by=popularity.desc&page=${page}`);
      const d=await r.json(); movies=d.results||[]; tp=d.total_pages;
    }
    renderMovies(movies, reset);
    if (page<tp && mode!=='foryou') document.getElementById('load-more').style.display='block';
  } catch { clearSkel(); }
}

async function buildForYou() {
  const likedIds=getLikedIds(), taste=getTasteGenres(), seen=getSeen();
  if (!likedIds.length && !taste.length) return [];
  const reqs = [];
  likedIds.slice(-4).forEach(id=>reqs.push(fetch(`https://api.themoviedb.org/3/movie/${id}/recommendations?api_key=${KEY}`).then(r=>r.json()).catch(()=>({results:[]}))));
  if (taste.length) {
    const tg=taste.slice(0,2).join(',');
    reqs.push(fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_genres=${tg}&sort_by=vote_average.desc&vote_count.gte=400&page=1`).then(r=>r.json()).catch(()=>({results:[]})));
    reqs.push(fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_genres=${tg}&sort_by=popularity.desc&page=1`).then(r=>r.json()).catch(()=>({results:[]})));
  }
  const results = await Promise.all(reqs);
  const seenSet = new Set(Object.keys(seen));
  const pool = {};
  results.forEach((d,i)=>{
    (d.results||[]).forEach(m=>{
      if (seenSet.has(String(m.id))) return;
      if (!pool[m.id]) pool[m.id]={...m,score:0};
      pool[m.id].score += i<likedIds.length ? 3 : 1;
      (m.genre_ids||[]).forEach(g=>{ if(taste.includes(g)) pool[m.id].score+=2; });
      pool[m.id].score += (m.vote_average||0)*0.08;
    });
  });
  return Object.values(pool).sort((a,b)=>b.score-a.score).slice(0,40);
}

function renderMovies(movies, reset) {
  const grid=document.getElementById('movie-grid');
  if (reset) grid.innerHTML=''; else clearSkel();
  const seen=getSeen();
  if (!movies.length && reset) {
    grid.innerHTML = mode==='foryou'
      ? `<div class="empty-state"><div class="empty-icon">🎬</div><div class="empty-title">Nothing yet</div><div class="empty-sub">Like some movies and your personalised feed will appear here.</div></div>`
      : `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No results</div><div class="empty-sub">Try a different search or genre.</div></div>`;
    return;
  }
  movies.forEach(m=>{
    const status=seen[String(m.id)]?.status;
    if (hideSeen && status) return;
    const card=document.createElement('div');
    card.className='movie-card'+(status?' is-rated':'');
    card.id=`card-${m.id}`;
    card.onclick=()=>openModal(m);
    const yr=m.release_date?.substring(0,4)||'';
    const rt=m.vote_average?m.vote_average.toFixed(1):'';
    const badge=status?`<div class="card-badge ${status}">${status==='liked'?'👍':status==='disliked'?'👎':'✓'}</div>`:'';
    card.innerHTML=`
      ${m.poster_path?`<img class="movie-poster" src="${IMGW}${m.poster_path}" alt="${m.title}" loading="lazy">`:`<div class="movie-poster-placeholder">🎬</div>`}
      ${badge}
      <div class="movie-overlay">
        <div class="movie-title">${m.title}</div>
        <div class="movie-meta"><span class="movie-year">${yr}</span>${rt?`<span class="movie-rating">★ ${rt}</span>`:''}</div>
      </div>`;
    grid.appendChild(card);
  });
}

function skeletons() { const g=document.getElementById('movie-grid'); g.innerHTML=''; for(let i=0;i<6;i++){const s=document.createElement('div');s.className='skeleton';g.appendChild(s);} document.getElementById('load-more').style.display='none'; }
function clearSkel() { document.querySelectorAll('.skeleton').forEach(s=>s.remove()); }
function loadMore() { page++; loadMovies(false); }

function toggleSearch() {
  const bar=document.getElementById('search-bar'),btn=document.getElementById('search-btn');
  if(bar.classList.contains('visible')){ bar.classList.remove('visible');btn.classList.remove('active');clearSearch(); }
  else { bar.classList.add('visible');btn.classList.add('active');document.getElementById('search-input').focus(); }
}
function handleSearch(v) {
  clearTimeout(searchT); search=v;
  if(v.length<2){ if(searching){ searching=false;page=1;updateLabel();skeletons();loadMovies(true); } return; }
  searchT=setTimeout(()=>{ searching=true;page=1;updateLabel();skeletons();loadMovies(true); },400);
}
function clearSearch() { document.getElementById('search-input').value='';search='';page=1;searching=false;updateLabel(); }

function toggleHideSeen() {
  hideSeen=!hideSeen;
  const lbl=document.getElementById('seen-lbl'),btn=document.getElementById('seen-toggle-btn');
  if(hideSeen){ lbl.textContent='SHOW SEEN';btn.classList.add('active'); } else { lbl.textContent='HIDE SEEN';btn.classList.remove('active'); }
  skeletons(); loadMovies(true);
}

// MODAL
async function openModal(movie) {
  modalId=movie.id; modalGenreIds=movie.genre_ids||[];
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
  // reset
  ['m-title','m-tagline','m-overview'].forEach(id=>document.getElementById(id).textContent='');
  ['m-stats','m-genres','ott-strip','cast-strip'].forEach(id=>document.getElementById(id).innerHTML='');
  ['ott-title','cast-title'].forEach(id=>document.getElementById(id).style.display='none');
  syncActionBtns(movie.id);
  try {
    const [dr,cr,pr] = await Promise.all([
      fetch(`https://api.themoviedb.org/3/movie/${movie.id}?api_key=${KEY}`),
      fetch(`https://api.themoviedb.org/3/movie/${movie.id}/credits?api_key=${KEY}`),
      fetch(`https://api.themoviedb.org/3/movie/${movie.id}/watch/providers?api_key=${KEY}`)
    ]);
    const [det,cred,prov] = await Promise.all([dr.json(),cr.json(),pr.json()]);

    if(det.genres) { modalGenreIds=det.genres.map(g=>g.id); }

    const bd=document.getElementById('m-backdrop');
    if(det.backdrop_path){bd.src=IMGB+det.backdrop_path;bd.style.display='block';}
    else if(det.poster_path){bd.src=IMGW+det.poster_path;bd.style.display='block';}
    else bd.style.display='none';

    document.getElementById('m-title').textContent=det.title;
    document.getElementById('m-tagline').textContent=det.tagline||'';
    const rt=det.runtime?`${Math.floor(det.runtime/60)}h ${det.runtime%60}m`:'—';
    document.getElementById('m-stats').innerHTML=`
      <div class="stat"><div class="stat-label">Rating</div><div class="stat-value gold">★ ${det.vote_average?det.vote_average.toFixed(1):'—'}</div></div>
      <div class="stat"><div class="stat-label">Votes</div><div class="stat-value">${det.vote_count?.toLocaleString()||'—'}</div></div>
      <div class="stat"><div class="stat-label">Year</div><div class="stat-value">${det.release_date?.substring(0,4)||'—'}</div></div>
      <div class="stat"><div class="stat-label">Runtime</div><div class="stat-value">${rt}</div></div>`;
    if(det.genres?.length) document.getElementById('m-genres').innerHTML=det.genres.map(g=>`<span class="genre-tag">${g.name}</span>`).join('');
    document.getElementById('m-overview').textContent=det.overview||'';

    // OTT India
    const india=prov.results?.IN;
    const flat=india?.flatrate||[], rent=india?.rent||[];
    const all=[...flat,...rent.filter(r=>!flat.find(f=>f.provider_id===r.provider_id))];
    document.getElementById('ott-title').style.display='block';
    if(all.length) {
      document.getElementById('ott-strip').innerHTML=all.slice(0,8).map(p=>`
        <div class="ott-item">
          <img class="ott-logo" src="${IMGL}${p.logo_path}" alt="${p.provider_name}" onerror="this.closest('.ott-item').remove()">
          <div class="ott-name">${p.provider_name}</div>
        </div>`).join('');
    } else {
      document.getElementById('ott-strip').innerHTML='<span class="no-ott">Not currently streaming in India</span>';
    }

    // Cast
    const cast=(cred.cast||[]).slice(0,12);
    if(cast.length){
      document.getElementById('cast-title').style.display='block';
      document.getElementById('cast-strip').innerHTML=cast.map(c=>`
        <div class="cast-card">
          <img class="cast-avatar" src="${c.profile_path?IMGF+c.profile_path:''}" onerror="this.src=''" alt="${c.name}">
          <div class="cast-name">${c.name}</div>
        </div>`).join('');
    }
  } catch { document.getElementById('m-title').textContent='Could not load film'; }
}

function syncActionBtns(id) {
  const s=getStatus(id);
  ['liked','seen','disliked'].forEach(k=>{ const b=document.getElementById(`btn-${k}`); b.className=`action-btn${s===k?' st-'+k:''}`; });
}

function markMovie(status) {
  if(!modalId) return;
  const seen=getSeen(), sid=String(modalId);
  const existing=seen[sid]||{};
  const movie={id:modalId, title:document.getElementById('m-title').textContent, genre_ids: modalGenreIds.length ? modalGenreIds : (existing.genre_ids||[])};
  const newStatus=setStatus(movie, status);
  syncActionBtns(modalId);
  const btn=document.getElementById(`btn-${status}`); btn.classList.add('popping'); setTimeout(()=>btn.classList.remove('popping'),300);
  // Update card
  const card=document.getElementById(`card-${modalId}`);
  if(card){
    let badge=card.querySelector('.card-badge');
    if(newStatus){
      if(!badge){badge=document.createElement('div');card.appendChild(badge);}
      badge.className=`card-badge ${newStatus}`;
      badge.textContent=newStatus==='liked'?'👍':newStatus==='disliked'?'👎':'✓';
      card.classList.add('is-rated');
    } else { badge?.remove(); card.classList.remove('is-rated'); }
    if(hideSeen && newStatus) card.style.display='none';
  }
  if(mode==='foryou') refreshTasteBar();
}

function overlayClick(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); document.body.style.overflow=''; modalId=null; }
function handleLogout(){ if(confirm('Change API key?')){ localStorage.removeItem('filtr_key'); location.reload(); } }
const delay=ms=>new Promise(r=>setTimeout(r,ms));
</script>
